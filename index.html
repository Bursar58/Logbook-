<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020617">
<title>Logbuch Glass Cockpit</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --bg-dark: #020617;
    --bg-gradient: linear-gradient(135deg, #020617 0%, #03142e 100%);
    --tile-bg: rgba(15, 23, 42, 0.7);
    --tile-border: rgba(56, 189, 248, 0.2);
    --glass-blur: blur(20px);
    --text-primary: #f1f5f9;
    --text-muted: #94a3b8;
    --accent: #38bdf8;
    --recording: #ef4444;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { 
    margin: 0; font-family: 'Inter', sans-serif; 
    background: var(--bg-gradient); color: var(--text-primary); 
    min-height: 100vh; overflow: hidden;
  }

  /* Utility */
  .font-bebas { font-family: 'Bebas Neue', sans-serif; }
  .font-mono { font-family: 'Space Mono', monospace; }

  /* Layout */
  .page { display: none; padding: 20px 16px 120px 16px; height: 100vh; overflow-y: auto; }
  .page.active { display: block; }

  /* Dashboard Tiles */
  .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  
  .glass-tile {
    background: var(--tile-bg); backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--tile-border); border-radius: 16px;
    padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .grid-full { grid-column: span 2; }
  .label { text-transform: uppercase; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 4px; display: block; }
  .val { font-family: 'Space Mono', monospace; font-size: 32px; font-weight: 700; line-height: 1; }
  .unit { font-size: 14px; color: var(--text-muted); margin-left: 4px; }

  /* FAB Button */
  .fab {
    position: fixed; bottom: 100px; right: 20px;
    width: 60px; height: 60px; border-radius: 50%;
    background: var(--accent); color: #000; border: none;
    box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
    cursor: pointer;
  }
  .fab.active { background: var(--recording); animation: pulse 1.5s infinite; color: #fff; }
  
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
    70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
    100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
  }

  /* Map */
  #leaflet-map { height: calc(100vh - 160px); border-radius: 16px; z-index: 1; }

  /* Navigation Bar */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(10px);
    border-top: 1px solid var(--tile-border);
    display: flex; justify-content: space-around;
    padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
    z-index: 999;
  }
  nav button { background: none; border: none; color: var(--text-muted); font-size: 10px; font-weight: 600; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
  nav button.active { color: var(--accent); }
  nav button svg { width: 22px; height: 22px; fill: currentColor; }

  /* Toast & Dialog */
  #toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 20px; border-radius: 30px; font-weight: bold; display: none; z-index: 5000; }
  dialog { background: var(--bg-dark); color: #fff; border: 1px solid var(--accent); border-radius: 16px; padding: 20px; min-width: 280px; }
  dialog::backdrop { background: rgba(0,0,0,0.7); }
  input { width: 100%; padding: 12px; margin-top: 10px; background: #1e293b; border: 1px solid var(--tile-border); color: #fff; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; }
  input:focus { outline: 1px solid var(--accent); }
</style>
</head>
<body>

<div id="toast">Nachricht</div>

<dialog id="save-dialog">
  <div class="font-bebas" style="font-size:20px; color:var(--accent); margin-bottom:4px;">Fahrt speichern</div>
  <input type="text" id="trip-name" placeholder="Name der Fahrt...">
  <button onclick="confirmSave()" style="width:100%; background:var(--accent); border:none; padding:12px; margin-top:10px; border-radius:8px; font-weight:bold; cursor:pointer; font-family:'Inter',sans-serif;">Speichern</button>
</dialog>

<nav>
  <button onclick="switchTab('dash')" id="btn-dash" class="active">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Cockpit
  </button>
  <button onclick="switchTab('map')" id="btn-map">
    <svg viewBox="0 0 24 24"><path d="M20.5 3l-5.5 2.1-6-2.1-5.64 1.9c-.21.07-.36.25-.36.48v15.12c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5z"/></svg>Karte
  </button>
  <button onclick="switchTab('log')" id="btn-log">
    <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg>Log
  </button>
</nav>

<button id="fab" class="fab" onclick="toggleTrip()">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>
</button>

<!-- COCKPIT PAGE -->
<div id="dash" class="page active">
  <div class="font-bebas" style="font-size:24px; color:var(--accent); margin-bottom:16px;">System Ready</div>
  
  <div class="glass-tile grid-full" style="margin-bottom:12px;">
    <span class="label">Position</span>
    <div id="pos-display" class="font-mono" style="font-size:14px;">Suche Satelliten...</div>
  </div>

  <div class="dashboard-grid">
    <div class="glass-tile">
      <span class="label">SOG</span>
      <div class="val"><span id="sog-val">0.0</span><span class="unit">kn</span></div>
    </div>
    <div class="glass-tile">
      <span class="label">Kurs</span>
      <div class="val"><span id="cog-val">---</span><span class="unit">°</span></div>
    </div>
    <div class="glass-tile">
      <span class="label">Trip</span>
      <div id="trip-time" class="val" style="font-size:24px;">00:00</div>
    </div>
    <div class="glass-tile">
      <span class="label">Distanz</span>
      <div class="val"><span id="trip-dist">0.0</span><span class="unit">nm</span></div>
    </div>
  </div>

  <div class="glass-tile" style="margin-top:12px;">
    <span class="label">Pegel Stand</span>
    <div class="val"><span id="pegel-val">---</span><span class="unit">cm</span></div>
    <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:11px; color:var(--text-muted);">
      <div id="pegel-hw">HW: Berechne...</div>
      <div id="pegel-nw">NW: Berechne...</div>
    </div>
  </div>
</div>

<!-- MAP PAGE -->
<div id="map" class="page">
  <div id="leaflet-map"></div>
</div>

<!-- LOG PAGE -->
<div id="log" class="page">
  <div class="font-bebas" style="font-size:24px; margin-bottom:16px;">Logbuch</div>
  <div id="log-list"></div>
</div>

<script>
  let myMap, marker, livePath, watchId;
  let tripActive = false, tripStartTime = null, tripPoints = [];
  let lastSavedPoint = null;

  // Config
  const STATION = "HAMBURG ST. PAULI";

  // --- INITIALIZE ---
  window.onload = () => {
    initMap();
    startGps();
    fetchPegel();
    renderLog();
    setInterval(fetchPegel, 600000); // 10 min
  };

  function initMap() {
    myMap = L.map('leaflet-map', { zoomControl: false }).setView([53.55, 9.99], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a>'
    }).addTo(myMap);
  }

  function switchTab(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('btn-' + id).classList.add('active');
    if (id === 'map') setTimeout(() => myMap.invalidateSize(), 200);
  }

  function toast(m) {
    const t = document.getElementById('toast');
    t.innerText = m;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  // --- GPS LOGIC ---
  function startGps() {
    if (!navigator.geolocation) {
      document.getElementById('pos-display').innerText = 'GPS nicht verfügbar';
      return;
    }
    watchId = navigator.geolocation.watchPosition(pos => {
      const { latitude, longitude, speed, heading, accuracy } = pos.coords;
      const sog = speed ? (speed * 1.94384).toFixed(1) : "0.0";
      const cog = heading !== null ? Math.round(heading) : "---";

      document.getElementById('pos-display').innerHTML = `N ${latitude.toFixed(5)}<br>E ${longitude.toFixed(5)}`;
      document.getElementById('sog-val').innerText = sog;
      document.getElementById('cog-val').innerText = cog;

      const latlng = [latitude, longitude];
      if (!marker) marker = L.marker(latlng).addTo(myMap);
      else marker.setLatLng(latlng);
      myMap.panTo(latlng);

      if (tripActive && accuracy < 200) {
        handleSmartTracking(latitude, longitude, speed, heading);
      }
    }, e => {
      console.error(e);
      document.getElementById('pos-display').innerText = 'GPS-Fehler: ' + e.message;
    }, { enableHighAccuracy: true, timeout: 30000 });
  }

  function handleSmartTracking(lat, lng, speed, heading) {
    if (!lastSavedPoint) {
      savePoint(lat, lng, speed, heading);
      return;
    }
    const dist = getDist(lat, lng, lastSavedPoint.lat, lastSavedPoint.lng);
    const headDiff = heading !== null && lastSavedPoint.heading !== null
      ? Math.abs(heading - lastSavedPoint.heading)
      : 0;

    // Smart Filter: Bewegung > 30m ODER Kurve > 10 Grad
    if (dist > 30 || headDiff > 10) {
      savePoint(lat, lng, speed, heading);
    }
  }

  function savePoint(lat, lng, speed, heading) {
    const pt = { lat, lng, speed, heading, ts: Date.now() };
    tripPoints.push(pt);
    lastSavedPoint = pt;

    if (!livePath) {
      livePath = L.polyline([[lat, lng]], { color: '#38bdf8', weight: 4 }).addTo(myMap);
    } else {
      livePath.addLatLng([lat, lng]);
    }
    updateDistDisplay();
  }

  function getDist(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const φ1 = lat1 * Math.PI / 180;
    const φ2 = lat2 * Math.PI / 180;
    const Δφ = (lat2 - lat1) * Math.PI / 180;
    const Δλ = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
      Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function updateDistDisplay() {
    let total = 0;
    for (let i = 1; i < tripPoints.length; i++) {
      total += getDist(tripPoints[i - 1].lat, tripPoints[i - 1].lng, tripPoints[i].lat, tripPoints[i].lng);
    }
    document.getElementById('trip-dist').innerText = (total / 1852).toFixed(1);
  }

  // --- TRIP CONTROL ---
  function toggleTrip() {
    const fab = document.getElementById('fab');
    if (!tripActive) {
      tripActive = true;
      tripStartTime = Date.now();
      tripPoints = [];
      lastSavedPoint = null;
      if (livePath) { myMap.removeLayer(livePath); livePath = null; }
      fab.classList.add('active');
      toast("Tracking gestartet");
      updateTimer();
    } else {
      stopTrip();
    }
  }

  function updateTimer() {
    if (!tripActive) return;
    const sec = Math.floor((Date.now() - tripStartTime) / 1000);
    const m = Math.floor(sec / 60);
    const h = Math.floor(m / 60);
    document.getElementById('trip-time').innerText =
      `${h.toString().padStart(2, '0')}:${(m % 60).toString().padStart(2, '0')}`;
    setTimeout(updateTimer, 1000);
  }

  function stopTrip() {
    tripActive = false;
    document.getElementById('fab').classList.remove('active');
    if (tripPoints.length > 1) {
      document.getElementById('trip-name').value = '';
      document.getElementById('save-dialog').showModal();
    } else {
      toast("Fahrt zu kurz zum Speichern");
    }
  }

  function confirmSave() {
    const name = document.getElementById('trip-name').value.trim() || "Unbenannter Törn";
    const trip = {
      name,
      start: tripStartTime,
      points: tripPoints,
      dist: document.getElementById('trip-dist').innerText
    };
    let logs = JSON.parse(localStorage.getItem('boat_logs') || "[]");
    logs.push(trip);
    localStorage.setItem('boat_logs', JSON.stringify(logs));
    document.getElementById('save-dialog').close();
    toast("Gespeichert ✓");
    renderLog();
  }

  // --- PEGEL LOGIC (ROBUST PEAK FINDING) ---
  async function fetchPegel() {
    const url = `https://www.pegelonline.wsv.de/webservices/rest-api/v2/stations/${encodeURIComponent(STATION)}/W/measurements.json?start=P3D`;
    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      if (!data.length) return;

      // Aktueller Wert
      document.getElementById('pegel-val').innerText = data[data.length - 1].value;

      // Peak-Suche mit 1-Stunden-Fenster (+/- 12 Punkte bei 5min Intervall)
      let lastHW = null, lastNW = null;
      const win = 12;

      for (let i = data.length - win - 1; i > win; i--) {
        const current = data[i].value;
        const slice = data.slice(i - win, i + win + 1).map(m => m.value);
        const isMax = current === Math.max(...slice);
        const isMin = current === Math.min(...slice);

        if (isMax && !lastHW) lastHW = { val: current, time: formatTideTime(data[i].timestamp) };
        if (isMin && !lastNW) lastNW = { val: current, time: formatTideTime(data[i].timestamp) };
        if (lastHW && lastNW) break;
      }

      if (lastHW) document.getElementById('pegel-hw').innerText = `HW: ${lastHW.val}cm (${lastHW.time})`;
      if (lastNW) document.getElementById('pegel-nw').innerText = `NW: ${lastNW.val}cm (${lastNW.time})`;

    } catch (e) {
      console.error("Pegel Error", e);
      document.getElementById('pegel-val').innerText = 'N/A';
    }
  }

  function formatTideTime(ts) {
    const d = new Date(ts);
    const today = new Date().toLocaleDateString();
    const label = d.toLocaleDateString() === today ? "" : "Gestern ";
    return label + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function renderLog() {
    const logs = JSON.parse(localStorage.getItem('boat_logs') || "[]");
    const list = document.getElementById('log-list');
    if (!logs.length) {
      list.innerHTML = '<div style="color:var(--text-muted); font-size:14px; text-align:center; margin-top:40px;">Noch keine Fahrten gespeichert.</div>';
      return;
    }
    list.innerHTML = logs.slice().reverse().map(l => `
      <div class="glass-tile" style="margin-bottom:10px;">
        <div class="font-bebas" style="color:var(--accent); font-size:18px;">${l.name}</div>
        <div style="font-size:11px; color:var(--text-muted)">${new Date(l.start).toLocaleDateString('de-DE')} • ${l.dist} nm</div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
